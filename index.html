<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You All</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>For You All</h1>

    <nav>
        <a href="#socks">Socks</a>
        <a href="#shirts">Shirts</a>
        <a href="#cart">Cart</a>
    </nav>
</header>

<section class="hero">
    <h2>FOR YOU ALL</h2>
    <p>Clothing designed for everyone.</p>
</section>

<section id="socks">
    <h2 class="section-title">Shop Socks</h2>
    <div class="products" id="sock-products"></div>
</section>

<section id="shirts">
    <h2 class="section-title">Shop Shirts</h2>
    <div class="products" id="shirt-products"></div>
</section>

<section id="cart">
    <h2 class="section-title">Shopping Cart</h2>

    <div id="cart-items"></div>

    <h3>Total: $<span id="cart-total">0</span></h3>

    <button class="checkout-btn">
        Checkout Coming Soon
    </button>
</section>

<footer>
    © 2026 For You All
</footer>

<script src="script.js"></script>

</body>
</html>
